<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RELATIVES | V6 PRO ULTIMATE</title>
    
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gun/sea.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #8e44ad;
            --primary-light: #a29bfe;
            --accent: #00d2ff;
            --bg: #05050a;
            --card-bg: rgba(20, 20, 35, 0.7);
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f0f0f0;
            --text-dim: #b3b3b3;
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        /* Custom Scrollbar for Windows */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        body { 
            background: var(--bg); 
            background-image: radial-gradient(circle at 50% -20%, #1e1e3f, #05050a);
            color: var(--text-main); 
            height: 100vh; 
            overflow: hidden; 
        }

        /* Auth Screen */
        #authWall { 
            position: fixed; inset: 0; 
            background: #05050a;
            display: flex; align-items: center; justify-content: center; z-index: 10000; 
        }
        .auth-card { 
            background: var(--card-bg); backdrop-filter: blur(20px); padding: 40px; 
            border-radius: 24px; border: 1px solid var(--glass-border); width: 90%; max-width: 400px; 
            text-align: center; box-shadow: var(--shadow);
        }
        .auth-card input { 
            width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; 
            border: 1px solid var(--glass-border); background: rgba(0,0,0,0.3); color: white; outline: none; 
            transition: 0.3s;
        }
        .auth-card input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(142, 68, 173, 0.3); }

        /* Main Layout Styles */
        .app-container { display: flex; height: 100vh; width: 100vw; }
        
        header { 
            position: fixed; top: 0; width: 100%; height: 70px;
            background: rgba(5, 5, 10, 0.8); backdrop-filter: blur(15px);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; border-bottom: 1px solid var(--glass-border); z-index: 900;
        }

        /* Sidebar Navigation */
        .sidebar { 
            width: 280px; background: rgba(10, 10, 20, 0.95); 
            border-right: 1px solid var(--glass-border); padding: 90px 15px 20px;
            display: flex; flex-direction: column; gap: 8px; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .nav-item { 
            padding: 14px 18px; border-radius: 12px; color: var(--text-dim); 
            text-decoration: none; display: flex; align-items: center; gap: 15px; 
            transition: 0.2s; cursor: pointer; font-weight: 500;
        }
        .nav-item i { width: 20px; font-size: 1.1rem; }
        .nav-item:hover { background: var(--glass); color: #fff; }
        .nav-item.active { background: var(--primary); color: #fff; box-shadow: 0 4px 15px rgba(142, 68, 173, 0.4); }

        /* Content Area */
        main { 
            flex: 1; padding-top: 70px; overflow-y: auto; 
            display: flex; justify-content: center;
        }
        .content-width { width: 100%; max-width: 800px; padding: 20px; }
        .page { display: none; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* UI Components */
        .card { 
            background: var(--card-bg); border-radius: 20px; padding: 20px; 
            margin-bottom: 20px; border: 1px solid var(--glass-border);
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        
        .btn { 
            padding: 12px 20px; border-radius: 12px; border: none; cursor: pointer;
            font-weight: 600; transition: 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn:active { transform: scale(0.96); }
        .btn-p { background: var(--primary); color: white; }
        .btn-p:hover { background: var(--primary-light); }
        .btn-s { background: var(--glass); color: white; border: 1px solid var(--glass-border); }

        /* DM Specific Layout (The "User Friendly" fix) */
        .dm-grid { display: grid; grid-template-columns: 280px 1fr; gap: 20px; height: calc(100vh - 120px); }
        .dm-sidebar { background: var(--card-bg); border-radius: 20px; overflow-y: auto; border: 1px solid var(--glass-border); }
        .contact-card { 
            padding: 15px; display: flex; align-items: center; gap: 12px; 
            cursor: pointer; border-bottom: 1px solid var(--glass-border); transition: 0.2s;
        }
        .contact-card:hover { background: var(--glass); }
        .contact-card.active { border-left: 4px solid var(--primary); background: var(--glass); }

        .chat-container { display: flex; flex-direction: column; height: 100%; background: var(--card-bg); border-radius: 20px; border: 1px solid var(--glass-border); }
        .chat-header { padding: 15px 20px; border-bottom: 1px solid var(--glass-border); display: flex; align-items: center; justify-content: space-between; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        /* Bubble Styles */
        .bubble { max-width: 80%; padding: 12px 16px; border-radius: 18px; line-height: 1.4; position: relative; }
        .msg-me { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .msg-them { align-self: flex-start; background: var(--glass-border); color: white; border-bottom-left-radius: 4px; }

        /* Mobile Adjustments */
        @media (max-width: 850px) {
            .sidebar { position: fixed; left: -280px; z-index: 1000; height: 100%; }
            .sidebar.open { left: 0; box-shadow: 10px 0 30px rgba(0,0,0,0.5); }
            .dm-grid { grid-template-columns: 1fr; }
            .dm-sidebar { display: block; }
            .chat-container { display: none; position: fixed; inset: 0; z-index: 950; border-radius: 0; padding-top: 70px; }
            .chat-container.mobile-open { display: flex; }
            .mobile-back { display: block !important; margin-right: 15px; cursor: pointer; }
            #userHead span { display: none; }
        }

        .mobile-back { display: none; }
        #mobile-overlay { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 999; 
        }
        #mobile-overlay.active { display: block; }
    </style>
</head>
<body>

    <div id="authWall">
        <div class="auth-card">
            <div style="font-size: 3rem; color: var(--primary); margin-bottom: 10px;"><i class="fas fa-atom"></i></div>
            <h1 style="letter-spacing: -1px; margin-bottom: 5px;">RELATIVES</h1>
            <p style="font-size: 0.8rem; opacity: 0.5; margin-bottom: 30px;">V6 DECENTRALIZED PROTOCOL</p>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button class="btn btn-p" style="width:100%; margin-top:10px;" onclick="handleAuth('signin')">Sign In</button>
            <button class="btn btn-s" style="width:100%; margin-top:10px;" onclick="handleAuth('signup')">Create Account</button>
            <p id="authError" style="color: #ff7675; margin-top: 15px; font-size: 0.8rem;"></p>
        </div>
    </div>

    <header>
        <div style="display:flex; align-items:center;">
            <i class="fas fa-bars" style="font-size: 1.4rem; cursor: pointer; margin-right: 20px;" onclick="toggleSidebar()"></i>
            <h2 style="font-weight: 700; background: linear-gradient(to right, #fff, #8e44ad); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">RELATIVES</h2>
        </div>
        <div id="userHead" style="display:flex; align-items:center; gap:12px;">
            <span id="myName" style="font-size: 0.9rem; font-weight: 600; opacity: 0.8;"></span>
            <img src="" id="myAvatar" style="width:38px; height:38px; border-radius:50%; border: 2px solid var(--primary);">
        </div>
    </header>

    <div class="app-container">
        <div id="mobile-overlay" onclick="toggleSidebar()"></div>
        <nav class="sidebar" id="sidebar">
            <div class="nav-item active" onclick="showPage('home', this)"><i class="fas fa-home"></i> Home Feed</div>
            <div class="nav-item" onclick="showPage('chat', this)"><i class="fas fa-comment-dots"></i> Global Chat</div>
            <div class="nav-item" onclick="showPage('dmPage', this)"><i class="fas fa-envelope"></i> Private DMs</div>
            <div class="nav-item" onclick="showPage('profile', this)"><i class="fas fa-user-cog"></i> Settings</div>
            <div class="nav-item" id="adminNav" style="display:none; color:#f1c40f;" onclick="showPage('admin', this)"><i class="fas fa-crown"></i> Admin</div>
            
            <div style="margin-top: auto; padding: 10px;">
                <button class="btn btn-s" style="width:100%; color: #ff7675;" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </nav>

        <main>
            <div class="content-width">
                
                <!-- Home -->
                <section id="home" class="page active">
                    <div id="broadcastArea"></div>
                    <div class="card">
                        <textarea id="postInput" style="width:100%; height:80px; background:transparent; border:none; color:white; outline:none; resize:none; font-size: 1rem;" placeholder="What's happening?"></textarea>
                        <div style="display:flex; justify-content:flex-end; padding-top:15px; border-top: 1px solid var(--glass-border);">
                            <button class="btn btn-p" onclick="createPost()">Post</button>
                        </div>
                    </div>
                    <div id="feed"></div>
                </section>

                <!-- Private DMs -->
                <section id="dmPage" class="page" style="max-width: 1000px;">
                    <div class="dm-grid">
                        <div class="dm-sidebar" id="dmContactList"></div>
                        <div class="chat-container" id="chatContainer">
                            <div class="chat-header">
                                <div style="display:flex; align-items:center;">
                                    <i class="fas fa-arrow-left mobile-back" onclick="closeMobileChat()"></i>
                                    <span id="dmHeader" style="font-weight:600;">Select a relative</span>
                                </div>
                                <div id="vanishIndicator" style="font-size:0.7rem; opacity:0.5;"></div>
                            </div>
                            <div class="chat-messages" id="dmWindow"></div>
                            <div style="padding:15px; display:flex; gap:10px; border-top: 1px solid var(--glass-border);">
                                <input type="text" id="dmInput" style="flex:1; background:var(--glass); border:1px solid var(--glass-border); padding:12px; border-radius:10px; color:white; outline:none;" placeholder="Message...">
                                <button class="btn btn-p" onclick="sendDM()"><i class="fas fa-paper-plane"></i></button>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Global Chat -->
                <section id="chat" class="page">
                    <div class="chat-container" style="height: 75vh;">
                        <div class="chat-header">Global Broadcast</div>
                        <div class="chat-messages" id="chatWindow"></div>
                        <div style="padding:15px; display:flex; gap:10px; border-top: 1px solid var(--glass-border);">
                            <input type="text" id="chatInput" style="flex:1; background:var(--glass); border:1px solid var(--glass-border); padding:12px; border-radius:10px; color:white; outline:none;" placeholder="Say something to everyone...">
                            <button class="btn btn-p" onclick="sendChat()"><i class="fas fa-paper-plane"></i></button>
                        </div>
                    </div>
                </section>

                <!-- Profile -->
                <section id="profile" class="page">
                    <div class="card" style="text-align:center;">
                        <img src="" id="profAvatar" style="width:100px; height:100px; border-radius:50%; margin-bottom:15px; border:3px solid var(--primary);">
                        <h2 id="profUser"></h2>
                        <div style="text-align:left; margin-top:30px;">
                            <label style="font-size:0.8rem; opacity:0.6;">Avatar Image URL</label>
                            <input type="text" id="avatarInput" style="width:100%; background:var(--glass); border:1px solid var(--glass-border); padding:12px; margin:10px 0; color:white; border-radius:10px;" placeholder="https://...">
                            <button class="btn btn-p" style="width:100%;" onclick="updateProfile()">Update Profile</button>
                        </div>
                    </div>
                </section>

                <!-- Admin -->
                <section id="admin" class="page">
                    <div class="card" style="border-color: #f1c40f;">
                        <h3 style="color:#f1c40f; margin-bottom:15px;">System Broadcast</h3>
                        <textarea id="bcInput" style="width:100%; background:rgba(0,0,0,0.2); border:1px solid #f1c40f; color:white; padding:10px; border-radius:10px;"></textarea>
                        <button class="btn btn-p" style="background:#f1c40f; color:black; margin-top:10px;" onclick="sendBroadcast()">Send to All Nodes</button>
                    </div>
                    <div id="adminUserList"></div>
                </section>

            </div>
        </main>
    </div>

    <script>
        const ADMIN_ALIAS = "Jurex";
        const ADMIN_PASS = "Jurex143";

        const gun = Gun(['https://gun-manhattan.herokuapp.com/gun', 'https://peer.wall.org/gun']);
        const user = gun.user().recall({sessionStorage: true});
        let currentDMUser = null;
        let dmSharedSecret = null;

        // Auth Logic
        function handleAuth(type) {
            const alias = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            if (!alias || !pass) return;

            if (type === 'signup') {
                user.create(alias, pass, (ack) => {
                    if (ack.err) alert(ack.err);
                    else {
                        gun.get('relatives_ultimate_reg').get(alias).put({alias, pass, epub: user._.sea.epub});
                        handleAuth('signin');
                    }
                });
            } else {
                user.auth(alias, pass, (ack) => {
                    if (ack.err) {
                        if (alias === ADMIN_ALIAS && pass === ADMIN_PASS) handleAuth('signup');
                        else alert("Auth Failed");
                    } else location.reload();
                });
            }
        }

        function logout() { user.leave(); location.reload(); }

        // Sidebar and Page Control
        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            const ov = document.getElementById('mobile-overlay');
            sb.classList.toggle('open');
            ov.classList.toggle('active');
        }

        function showPage(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            if (window.innerWidth < 850) toggleSidebar();
        }

        // Mobile DM Navigation
        function closeMobileChat() {
            document.getElementById('chatContainer').classList.remove('mobile-open');
        }

        // Core Init
        user.get('alias').on(name => {
            if (name) {
                document.getElementById('authWall').style.display = 'none';
                document.getElementById('myName').innerText = name;
                document.getElementById('profUser').innerText = name;
                if (name === ADMIN_ALIAS) {
                    document.getElementById('adminNav').style.display = 'flex';
                }
                user.get('avatar').on(url => {
                    const src = url || `https://api.dicebear.com/7.x/identicon/svg?seed=${name}`;
                    document.getElementById('myAvatar').src = src;
                    document.getElementById('profAvatar').src = src;
                });
                loadContacts();
            }
        });

        // Content Loaders
        function loadContacts() {
            gun.get('relatives_ultimate_reg').map().once((data) => {
                if (!data || data.alias === user.is.alias || document.getElementById('cnt-'+data.alias)) return;
                const div = document.createElement('div');
                div.id = 'cnt-' + data.alias;
                div.className = 'contact-card';
                div.onclick = () => openDM(data.alias, div);
                div.innerHTML = `
                    <img src="https://api.dicebear.com/7.x/identicon/svg?seed=${data.alias}" style="width:35px; height:35px; border-radius:50%;">
                    <div>
                        <div style="font-size:0.9rem; font-weight:600;">${data.alias}</div>
                        <div style="font-size:0.7rem; opacity:0.5;">Online</div>
                    </div>
                `;
                document.getElementById('dmContactList').appendChild(div);
            });
        }

        async function openDM(target, el) {
            currentDMUser = target;
            document.querySelectorAll('.contact-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            
            if (window.innerWidth < 850) {
                document.getElementById('chatContainer').classList.add('mobile-open');
            }

            document.getElementById('dmHeader').innerText = `@${target}`;
            document.getElementById('dmWindow').innerHTML = '';
            
            gun.get('relatives_ultimate_reg').get(target).once(async data => {
                dmSharedSecret = await SEA.secret(data.epub, user._.sea);
                const path = [user.is.alias, target].sort().join('_');
                gun.get('rel_direct_v6').get(path).map().once(async (msg, id) => {
                    const dec = await SEA.decrypt(msg.data, dmSharedSecret);
                    if (dec) renderMsg('dmWindow', msg.from, dec, id);
                });
            });
        }

        function renderMsg(containerId, author, text, id) {
            if (document.getElementById('m-'+id)) return;
            const win = document.getElementById(containerId);
            const div = document.createElement('div');
            div.id = 'm-' + id;
            div.className = `bubble ${author === user.is.alias ? 'msg-me' : 'msg-them'}`;
            div.innerHTML = `<small style="display:block; font-size:0.6rem; opacity:0.7; margin-bottom:4px;">${author}</small>${text}`;
            win.appendChild(div);
            win.scrollTop = win.scrollHeight;
        }

        async function sendDM() {
            const val = document.getElementById('dmInput').value;
            if (!val || !dmSharedSecret) return;
            const encrypted = await SEA.encrypt(val, dmSharedSecret);
            const path = [user.is.alias, currentDMUser].sort().join('_');
            gun.get('rel_direct_v6').get(path).set({ from: user.is.alias, data: encrypted, time: Date.now() });
            document.getElementById('dmInput').value = '';
        }

        // Global Chat
        function sendChat() {
            const val = document.getElementById('chatInput').value;
            if (val) gun.get('rel_global_v6').set({ user: user.is.alias, text: val });
            document.getElementById('chatInput').value = '';
        }
        gun.get('rel_global_v6').map().once((d, id) => { if(d.text) renderMsg('chatWindow', d.user, d.text, id) });

        // Feed logic
        function createPost() {
            const body = document.getElementById('postInput').value;
            if (body) gun.get('rel_posts_v6').set({ author: user.is.alias, body, time: Date.now() });
            document.getElementById('postInput').value = '';
        }

        gun.get('rel_posts_v6').map().once((data, id) => {
            if (!data.body || document.getElementById('post-'+id)) return;
            const card = document.createElement('div');
            card.id = 'post-'+id;
            card.className = 'card';
            card.innerHTML = `
                <div style="display:flex; gap:12px; align-items:center; margin-bottom:12px;">
                    <img src="https://api.dicebear.com/7.x/identicon/svg?seed=${data.author}" style="width:35px; height:35px; border-radius:50%;">
                    <span style="font-weight:600;">${data.author}</span>
                </div>
                <div style="line-height:1.5;">${data.body}</div>
            `;
            document.getElementById('feed').prepend(card);
        });

        function updateProfile() {
            const url = document.getElementById('avatarInput').value;
            if(url) user.get('avatar').put(url);
        }

        function sendBroadcast() {
            const val = document.getElementById('bcInput').value;
            if (val) gun.get('rel_broadcast_v6').set({ msg: val });
            document.getElementById('bcInput').value = '';
        }

        gun.get('rel_broadcast_v6').map().once(bc => {
            const div = document.createElement('div');
            div.className = 'card';
            div.style.borderColor = '#f1c40f';
            div.innerHTML = `<div style="color:#f1c40f; font-size:0.7rem; font-weight:bold; margin-bottom:5px;"><i class="fas fa-shield-alt"></i> SYSTEM BROADCAST</div>${bc.msg}`;
            document.getElementById('broadcastArea').prepend(div);
        });

    </script>
</body>
</html>
