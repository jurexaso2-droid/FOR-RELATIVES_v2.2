<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GCOS | Decentralized Portal</title>
    
    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gun/sea.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #9b59b6;
            --primary-dark: #8e44ad;
            --secondary: #2ecc71;
            --accent: #00d2ff;
            --bg: #0f0c29;
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text: #ffffff;
            --error: #e74c3c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Segoe UI', sans-serif; }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

        /* Auth Wall */
        #authWall {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            z-index: 1000; background: var(--bg);
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        .auth-form { width: 100%; max-width: 400px; text-align: center; }
        .auth-form h1 { font-size: 2.5rem; margin-bottom: 0.5rem; color: var(--primary); }
        .auth-form input {
            width: 100%; padding: 12px; margin: 10px 0;
            background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
            border-radius: 10px; color: white; outline: none;
        }

        .btn {
            padding: 12px 25px; border-radius: 10px; border: none; cursor: pointer;
            font-weight: 600; transition: 0.3s; margin: 5px; display: inline-block;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-2px); }
        .btn-admin { background: #f39c12; color: white; }

        /* App Layout */
        #app { display: none; height: 100vh; flex-direction: column; }
        
        header {
            height: 70px; padding: 0 2rem; display: flex; align-items: center;
            justify-content: space-between; background: var(--glass);
            border-bottom: 1px solid var(--glass-border); backdrop-filter: blur(10px);
        }

        .main-container { display: flex; flex: 1; overflow: hidden; }

        /* Sidebar */
        nav.sidebar {
            width: 260px; padding: 1.5rem; display: flex; flex-direction: column;
            border-right: 1px solid var(--glass-border);
        }
        .nav-item {
            padding: 12px 15px; border-radius: 12px; color: #ccc;
            text-decoration: none; margin-bottom: 8px; transition: 0.3s;
            cursor: pointer; display: flex; align-items: center; gap: 10px;
        }
        .nav-item:hover, .nav-item.active {
            background: var(--primary); color: white;
        }

        /* Content Area */
        main { flex: 1; padding: 2rem; overflow-y: auto; }
        .page { display: none; max-width: 800px; margin: 0 auto; }
        .page.active { display: block; animation: fadeIn 0.4s ease; }

        /* Feed */
        .post-box { margin-bottom: 2rem; }
        .post-box textarea {
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
            border-radius: 12px; padding: 1rem; color: white; resize: none; min-height: 100px;
        }

        .post {
            background: var(--glass); border: 1px solid var(--glass-border);
            padding: 1.5rem; border-radius: 15px; margin-bottom: 1rem;
            position: relative;
        }
        .post-header { display: flex; justify-content: space-between; margin-bottom: 1rem; }
        .post-user { font-weight: bold; color: var(--primary); }
        .post-date { font-size: 0.8rem; opacity: 0.6; }
        .delete-btn { color: var(--error); cursor: pointer; font-size: 0.9rem; }

        /* Admin Section */
        .admin-card { border-left: 4px solid #f39c12; margin-bottom: 1rem; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 2rem; }
        .stat-box { background: rgba(0,0,0,0.2); padding: 1rem; border-radius: 10px; text-align: center; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- Auth Wall -->
    <div id="authWall">
        <div class="glass-card auth-form">
            <h1>GCOS</h1>
            <p style="margin-bottom: 1.5rem; opacity: 0.7;">Community Network</p>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <div style="margin-top: 1rem;">
                <button class="btn btn-primary" onclick="auth('signin')">Sign In</button>
                <button class="btn" style="background: rgba(255,255,255,0.1); color: white;" onclick="auth('signup')">Register</button>
            </div>
            <p id="authMsg" style="margin-top: 1rem; font-size: 0.9rem;"></p>
        </div>
    </div>

    <!-- Main App -->
    <div id="app">
        <header>
            <div style="display: flex; align-items: center; gap: 10px;">
                <i class="fas fa-circle-nodes" style="color: var(--primary); font-size: 1.5rem;"></i>
                <h2 style="letter-spacing: 1px;">GCOS</h2>
            </div>
            <div id="userDisplay" style="display: flex; align-items: center; gap: 15px;">
                <span id="curUser"></span>
                <button class="btn" onclick="logout()" style="background: var(--error); padding: 5px 15px; font-size: 0.8rem;">Logout</button>
            </div>
        </header>

        <div class="main-container">
            <nav class="sidebar">
                <div class="nav-item active" onclick="showPage('home')"><i class="fas fa-home"></i> Home Feed</div>
                <div class="nav-item" onclick="showPage('bylaws')"><i class="fas fa-book"></i> Bylaws</div>
                <div class="nav-item" onclick="showPage('officers')"><i class="fas fa-shield-halved"></i> Officers</div>
                <div class="nav-item hidden" id="adminTab" onclick="showPage('admin')"><i class="fas fa-user-shield"></i> Admin Panel</div>
            </nav>

            <main>
                <!-- Home Feed -->
                <section id="home" class="page active">
                    <div class="glass-card post-box">
                        <textarea id="postInput" placeholder="Share something with GCOS..."></textarea>
                        <div style="text-align: right; margin-top: 10px;">
                            <button class="btn btn-primary" onclick="createPost()">Post to Network</button>
                        </div>
                    </div>
                    <div id="feed"></div>
                </section>

                <!-- Bylaws -->
                <section id="bylaws" class="page">
                    <div class="glass-card">
                        <h2 style="margin-bottom: 1rem; color: var(--primary);">Community Bylaws</h2>
                        <div id="bylawsContent" style="line-height: 1.6; opacity: 0.9;">
                            Loading bylaws...
                        </div>
                    </div>
                </section>

                <!-- Officers -->
                <section id="officers" class="page">
                    <h2 style="margin-bottom: 1.5rem;">Board of Officers</h2>
                    <div id="officersList" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem;">
                        <!-- dynamic -->
                    </div>
                </section>

                <!-- Admin Panel -->
                <section id="admin" class="page">
                    <h2 style="margin-bottom: 1.5rem; color: #f39c12;">Database Management</h2>
                    
                    <div class="stat-grid">
                        <div class="stat-box">
                            <h4 id="countPosts">0</h4>
                            <p>Total Posts</p>
                        </div>
                        <div class="stat-box">
                            <h4 id="countUsers">Active</h4>
                            <p>System Status</p>
                        </div>
                    </div>

                    <div class="glass-card admin-card">
                        <h3>Update Bylaws</h3>
                        <textarea id="adminBylawsInput" style="width:100%; margin-top:10px; min-height: 150px; background: rgba(0,0,0,0.3); color: white; border: 1px solid var(--glass-border); padding: 10px;"></textarea>
                        <button class="btn btn-admin" onclick="updateBylaws()" style="margin-top: 10px;">Save Official Bylaws</button>
                    </div>

                    <div class="glass-card admin-card" style="margin-top: 2rem;">
                        <h3>Add Officer</h3>
                        <div style="display: flex; gap: 10px; margin-top: 10px;">
                            <input type="text" id="offName" placeholder="Name" style="flex:1; padding: 8px; border-radius: 5px; border:none;">
                            <input type="text" id="offRole" placeholder="Role" style="flex:1; padding: 8px; border-radius: 5px; border:none;">
                            <button class="btn btn-admin" onclick="addOfficer()">Add</button>
                        </div>
                    </div>
                </section>
            </main>
        </div>
    </div>

    <script>
        // Initialize GunDB
        // We use a public relay peer for the demo.
        const gun = Gun(['https://gun-manhattan.herokuapp.com/gun']);
        const user = gun.user().recall({sessionStorage: true});
        const ADMIN_PUB = "ADMIN_OVERRIDE_KEY"; // In a real app, this would be a specific Public Key

        // --- AUTHENTICATION ---
        function auth(type) {
            const alias = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const msg = document.getElementById('authMsg');

            if (type === 'signup') {
                user.create(alias, pass, (ack) => {
                    if (ack.err) msg.innerText = ack.err;
                    else {
                        msg.style.color = "var(--secondary)";
                        msg.innerText = "Account Created! Signing in...";
                        setTimeout(() => auth('signin'), 1000);
                    }
                });
            } else {
                user.auth(alias, pass, (ack) => {
                    if (ack.err) msg.innerText = ack.err;
                    else location.reload();
                });
            }
        }

        function logout() {
            user.leave();
            location.reload();
        }

        // --- SESSION MANAGEMENT ---
        user.get('alias').on(alias => {
            if (alias) {
                document.getElementById('authWall').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                document.getElementById('curUser').innerText = alias;
                
                // Admin Logic: For this demo, let's say "admin" username is the manager
                if (alias.toLowerCase() === 'admin') {
                    document.getElementById('adminTab').classList.remove('hidden');
                }
            }
        });

        // --- NAVIGATION ---
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // --- POSTING LOGIC ---
        function createPost() {
            const content = document.getElementById('postInput').value;
            if (!content) return;

            const postObj = {
                author: document.getElementById('curUser').innerText,
                body: content,
                time: Date.now()
            };

            gun.get('gcos_v1_posts').set(postObj);
            document.getElementById('postInput').value = '';
        }

        // Real-time Feed Listener
        let postCounter = 0;
        gun.get('gcos_v1_posts').map().once((data, id) => {
            if (!data) return;
            postCounter++;
            document.getElementById('countPosts').innerText = postCounter;

            const feed = document.getElementById('feed');
            const isAdmin = document.getElementById('curUser').innerText.toLowerCase() === 'admin';

            const postEl = document.createElement('div');
            postEl.className = 'post';
            postEl.id = id;
            postEl.innerHTML = `
                <div class="post-header">
                    <span class="post-user">@${data.author}</span>
                    <span class="post-date">${new Date(data.time).toLocaleTimeString()}</span>
                </div>
                <p>${data.body}</p>
                ${isAdmin ? `<div style="margin-top:10px; text-align:right;"><span class="delete-btn" onclick="deletePost('${id}')"><i class="fas fa-trash"></i> Delete</span></div>` : ''}
            `;
            feed.prepend(postEl);
        });

        function deletePost(id) {
            gun.get('gcos_v1_posts').get(id).put(null);
            document.getElementById(id).remove();
        }

        // --- BYLAWS LOGIC ---
        gun.get('gcos_metadata').get('bylaws').on(data => {
            const val = data || "The community bylaws have not been set by the administrator yet.";
            document.getElementById('bylawsContent').innerText = val;
            document.getElementById('adminBylawsInput').value = val;
        });

        function updateBylaws() {
            const text = document.getElementById('adminBylawsInput').value;
            gun.get('gcos_metadata').get('bylaws').put(text);
            alert("Bylaws updated across the network!");
        }

        // --- OFFICERS LOGIC ---
        function addOfficer() {
            const name = document.getElementById('offName').value;
            const role = document.getElementById('offRole').value;
            if(!name || !role) return;

            gun.get('gcos_metadata').get('officers').get(name).put({
                name: name,
                role: role
            });
            document.getElementById('offName').value = '';
            document.getElementById('offRole').value = '';
        }

        gun.get('gcos_metadata').get('officers').map().on((data, name) => {
            if (!data) return;
            const list = document.getElementById('officersList');
            const existing = document.getElementById('off-'+name.replace(/\s/g, ''));
            if (existing) existing.remove();

            const card = document.createElement('div');
            card.className = 'glass-card';
            card.id = 'off-'+name.replace(/\s/g, '');
            card.style.textAlign = 'center';
            card.innerHTML = `
                <div style="width:60px; height:60px; background:var(--primary); border-radius:50%; margin: 0 auto 10px; display:flex; align-items:center; justify-content:center; font-size:1.5rem;">
                    <i class="fas fa-user-tie"></i>
                </div>
                <h4 style="color:var(--primary)">${data.name}</h4>
                <p style="font-size:0.8rem; opacity:0.8;">${data.role}</p>
            `;
            list.appendChild(card);
        });

    </script>
</body>
</html>
